<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="560" fill="#ffffff"/>
  <text x="430" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">Smart Doorbell — Connection Diagram (V1 + OLED)</text>

  <!-- ===== USB charger ===== -->
  <rect x="20" y="120" width="86" height="52" rx="6" fill="#eef2ff" stroke="#3355cc" stroke-width="1.5"/>
  <text x="63" y="143" text-anchor="middle" font-size="12" fill="#222">5V USB</text>
  <text x="63" y="159" text-anchor="middle" font-size="12" fill="#222">charger</text>

  <!-- ===== CS-CAM board ===== -->
  <rect x="130" y="80" width="170" height="320" rx="8" fill="#23242a" stroke="#000" stroke-width="1.5"/>
  <text x="215" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">CS-CAM</text>
  <text x="215" y="126" text-anchor="middle" font-size="11" fill="#bbb">ESP32-CAM (USB-B)</text>
  <!-- USB port on left -->
  <rect x="118" y="135" width="12" height="26" fill="#999"/>
  <!-- right-side pins -->
  <g font-size="12" fill="#fff" text-anchor="end">
    <circle cx="300" cy="160" r="4" fill="#7fd"/><text x="292" y="164">IO13</text>
    <circle cx="300" cy="200" r="4" fill="#7af"/><text x="292" y="204">IO14</text>
    <circle cx="300" cy="240" r="4" fill="#7af"/><text x="292" y="244">IO15</text>
    <circle cx="300" cy="320" r="4" fill="#f77"/><text x="292" y="324">5V</text>
    <circle cx="300" cy="360" r="4" fill="#ccc"/><text x="292" y="364">GND</text>
  </g>

  <!-- ===== OLED ===== -->
  <rect x="560" y="70" width="200" height="120" rx="8" fill="#0b2030" stroke="#1a3a55" stroke-width="1.5"/>
  <rect x="585" y="92" width="150" height="78" rx="3" fill="#06121c"/>
  <text x="660" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">OLED 128×64 (SH1106)</text>
  <g font-size="11" fill="#fff" text-anchor="start">
    <circle cx="560" cy="92"  r="4" fill="#f77"/><text x="568" y="96">VCC</text>
    <circle cx="560" cy="118" r="4" fill="#ccc"/><text x="568" y="122">GND</text>
    <circle cx="560" cy="144" r="4" fill="#7af"/><text x="568" y="148">SCK</text>
    <circle cx="560" cy="170" r="4" fill="#7af"/><text x="568" y="174">SDA</text>
  </g>

  <!-- ===== Button ===== -->
  <rect x="585" y="250" width="120" height="80" rx="8" fill="#3a3f4a" stroke="#000" stroke-width="1.5"/>
  <text x="645" y="296" text-anchor="middle" font-size="13" fill="#fff">Button</text>
  <circle cx="585" cy="270" r="4" fill="#7fd"/><text x="578" y="274" text-anchor="end" font-size="11" fill="#fff">A</text>
  <circle cx="585" cy="310" r="4" fill="#ccc"/><text x="578" y="314" text-anchor="end" font-size="11" fill="#fff">B</text>

  <!-- ===== Power rails (breadboard) ===== -->
  <line x1="80" y1="450" x2="800" y2="450" stroke="#d33" stroke-width="3"/>
  <text x="84" y="444" font-size="11" fill="#d33">+5V rail</text>
  <line x1="80" y1="495" x2="800" y2="495" stroke="#222" stroke-width="3"/>
  <text x="84" y="489" font-size="11" fill="#222">GND rail</text>

  <!-- ===== Wires ===== -->
  <!-- USB power -->
  <line x1="106" y1="148" x2="118" y2="148" stroke="#3355cc" stroke-width="2"/>
  <text x="112" y="140" font-size="10" fill="#3355cc">USB-B</text>

  <!-- IO13 -> Button A (green) -->
  <polyline points="300,160 360,160 360,270 585,270" fill="none" stroke="#2aa84a" stroke-width="2.5"/>
  <text x="430" y="153" font-size="11" fill="#2aa84a">IO13  (button, INPUT_PULLUP)</text>

  <!-- IO14 -> 1k -> OLED SDA (blue) -->
  <polyline points="300,200 420,200" fill="none" stroke="#3377dd" stroke-width="2.5"/>
  <rect x="420" y="193" width="40" height="14" fill="#fff" stroke="#3377dd"/>
  <text x="440" y="204" text-anchor="middle" font-size="9" fill="#3377dd">1kΩ</text>
  <polyline points="460,200 520,200 520,170 560,170" fill="none" stroke="#3377dd" stroke-width="2.5"/>
  <text x="332" y="193" font-size="11" fill="#3377dd">IO14 → SDA</text>

  <!-- IO15 -> 1k -> OLED SCK (blue) -->
  <polyline points="300,240 420,240" fill="none" stroke="#3377dd" stroke-width="2.5"/>
  <rect x="420" y="233" width="40" height="14" fill="#fff" stroke="#3377dd"/>
  <text x="440" y="244" text-anchor="middle" font-size="9" fill="#3377dd">1kΩ</text>
  <polyline points="460,240 500,240 500,144 560,144" fill="none" stroke="#3377dd" stroke-width="2.5"/>
  <text x="332" y="258" font-size="11" fill="#3377dd">IO15 → SCK</text>

  <!-- CS-CAM 5V -> +5V rail (red) -->
  <polyline points="300,320 330,320 330,450" fill="none" stroke="#d33" stroke-width="2.5"/>
  <!-- CS-CAM GND -> GND rail (black) -->
  <polyline points="300,360 360,360 360,495" fill="none" stroke="#222" stroke-width="2.5"/>

  <!-- OLED VCC -> +5V rail -->
  <polyline points="560,92 540,92 540,450" fill="none" stroke="#d33" stroke-width="2.5"/>
  <!-- OLED GND -> GND rail -->
  <polyline points="560,118 520,118 520,495" fill="none" stroke="#222" stroke-width="2.5"/>
  <!-- Button B -> GND rail -->
  <polyline points="585,310 570,310 570,495" fill="none" stroke="#222" stroke-width="2.5"/>

  <!-- ===== Legend ===== -->
  <g font-size="11">
    <rect x="80" y="515" width="700" height="32" rx="5" fill="#f6f6f8" stroke="#ddd"/>
    <line x1="95" y1="531" x2="125" y2="531" stroke="#d33" stroke-width="3"/><text x="130" y="535" fill="#222">5V</text>
    <line x1="165" y1="531" x2="195" y2="531" stroke="#222" stroke-width="3"/><text x="200" y="535" fill="#222">GND</text>
    <line x1="245" y1="531" x2="275" y2="531" stroke="#3377dd" stroke-width="3"/><text x="280" y="535" fill="#222">I²C (SDA/SCL)</text>
    <line x1="385" y1="531" x2="415" y2="531" stroke="#2aa84a" stroke-width="3"/><text x="420" y="535" fill="#222">button</text>
    <text x="500" y="535" fill="#a00">⚠ 1kΩ in series on SDA/SCL — OLED runs on 5V, ESP32 pins are 3.3V max</text>
  </g>
</svg>
